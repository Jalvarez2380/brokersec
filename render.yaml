services:
  - type: web
    name: brokersec-backend
    runtime: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health/ready
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: brokersec-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: brokersec-postgres
    plan: free
    region: ohio
    databaseName: brokersec
    postgresMajorVersion: "17"
